name: ci/cd for airada_poc

on:
  push:
    branches: ['main']
    workflow_dispatch:

jobs:
  lint-static-type-security-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Ruff
        run: |
          ruff check .
      - name: Run Black
        run: |
          black --check .